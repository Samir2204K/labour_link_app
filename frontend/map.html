<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labour Link - Find Nearby Workers</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        #map { height: 70vh; width: 100%; }
        .container { padding: 20px; }
        .worker-list { margin-top: 20px; }
        .worker-item { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .header { background: #2563eb; color: white; padding: 15px; text-align: center; }
        .btn { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Labour Link</h1>
        <p>Find nearby service providers instantly</p>
    </div>

    <div id="map"></div>

    <div class="container">
        <button class="btn" onclick="locateUser()">Find My Location</button>
        <div id="status">Ready</div>
        
        <div class="worker-list" id="worker-list">
            <h3>Nearby Workers (within 5km)</h3>
            <div id="workers">No workers found yet. Locate yourself first.</div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="map.js"></script>
</body>
</html>
